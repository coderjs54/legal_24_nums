# .github/workflows/ci.yml
name: Build Release Binaries

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: legal_24_nums-linux
            asset_name: legal_24_nums-linux
          - os: macos-latest
            artifact_name: legal_24_nums-macos
            asset_name: legal_24_nums-macos
          - os: windows-latest
            artifact_name: legal_24_nums-windows
            asset_name: legal_24_nums-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          cache: true

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifact (rename binary)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/legal_24_nums.exe ./${{ matrix.asset_name }}
          else
            cp target/release/legal_24_nums ./${{ matrix.asset_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}
